{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}
<div class="col-md-8">

    <div class="card">
        <div class="card-header">
            <h5 class="card-title"> Type in Dish Details:</h5>
        </div>
        <div class="card-body">

            <form method="POST" action="{% url 'update_dish' pk=d.pk %}">{% csrf_token %}
            
                <div class="form-group">
                    <label for="name"> Name: </label>
                    <input type="text" class="form-control" id="dname" name="dname" value="{{d.name}}" disabled>
                </div>

                <div class="row">
                    <div class="col-6">
                        <div class="form-group">
                            <label for="ctime"> Cook Time: </label>
                            <input type="number" class="form-control w-50" id="ctime" name="ctime" value="{{d.cook_time}}" min="0" oninput="if(this.value < 0) this.value = 0;" required>
                        </div>
        
                    </div>
                    <div class="col-6">
                        <div class="form-group">
                            <label for="ptime"> Prep Time: </label>
                            <input type="number" class="form-control w-50" id="ptime" name="ptime" value="{{d.prep_time}}" min="0" oninput="if(this.value < 0) this.value = 0;" required>
                        </div>
        
                    </div>
                </div>

                <button type="submit" class="mt-3 btn btn-primary">Update dish</button>
            </form>                

        </div>
    </div>

</div>
{% endblock %}
